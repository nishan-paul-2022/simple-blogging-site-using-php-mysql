services:
  # MySQL Database
  database:
    image: mysql:8.0
    container_name: blog-database
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blog_db
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      timeout: 20s
      retries: 10
      start_period: 30s

  # Redis Cache
  cache:
    image: redis:7-alpine
    container_name: blog-cache
    ports:
      - "6379:6379"
    networks:
      - blog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s

  # Laravel Backend API
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: blog-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: BlogAPI
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: blog_db
      DB_USERNAME: blog_user
      DB_PASSWORD: blog_password
      CACHE_DRIVER: redis
      REDIS_HOST: cache
      REDIS_PORT: 6379
      SESSION_DRIVER: cookie
    volumes:
      # Use an anonymous volume for vendor to preserve what was built in the image
      - ./app-backend:/var/www/app-backend
      - /var/www/app-backend/vendor
      - /var/www/app-backend/bootstrap/cache
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped
    command: >
      sh -c "php artisan migrate --force &&
             php artisan storage:link --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # Next.js Frontend
  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ./app-frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - app-backend
    networks:
      - blog-network
    restart: unless-stopped
    command: npm run dev

  # Nginx Web Server (HTTP only)
  web-server:
    image: nginx:alpine
    container_name: blog-webserver
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-backend
      - app-frontend
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  blog-network:
    driver: bridge
